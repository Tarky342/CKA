<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>getDiff テスト</title>
  <style>body{font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;padding:16px}pre{white-space:pre-wrap;background:#f6f8fa;padding:12px;border-radius:6px}</style>
</head>
<body>
  <h1>getDiff テスト</h1>
  <p>
    <button id="raw">差分を表示 (/raw)</button>
    <button id="summary">差分要約 (/summary)</button>
  </p>
  <h2>出力</h2>
  <pre id="out">ここに出力が表示されます</pre>

  <script>
    async function fetchText(path) {
      const r = await fetch(path)
      return r.text()
    }
    document.getElementById('raw').addEventListener('click', async ()=>{
      const t = await fetchText('/raw')
      document.getElementById('out').textContent = t || '差分なし'
    })
    document.getElementById('summary').addEventListener('click', async ()=>{
      const r = await fetch('/summary')
      const j = await r.json()
      document.getElementById('out').textContent = j.text || '差分なし'
    })
  </script>
</body>
</html>
